<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1726">
    <title>Nexwork | Multi-repo feature delivery workspace</title>
    <meta
      name="description"
      content="Nexwork is a desktop workspace for multi-repository feature delivery, dependency-aware setup, Git visibility, and durable feature memory."
    >
    <meta
      name="keywords"
      content="multi-repo, git worktrees, feature delivery, developer workspace, desktop app, feature memory"
    >
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nexwork.dev/">
    <meta property="og:title" content="Nexwork | Multi-repo feature delivery workspace">
    <meta property="og:description" content="A desktop workspace for cross-repository feature work, dependency-aware setup, Git visibility, and feature memory.">
    <meta property="og:image" content="https://nexwork.dev/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://nexwork.dev/">
    <meta property="twitter:title" content="Nexwork | Multi-repo feature delivery workspace">
    <meta property="twitter:description" content="A desktop workspace for cross-repository feature work, dependency-aware setup, Git visibility, and feature memory.">
    <meta property="twitter:image" content="https://nexwork.dev/logo.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://nexwork.dev/">
    
    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Nexwork",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "macOS",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A desktop workspace for multi-repository feature delivery, scoped workspaces, Git sync visibility, and feature memory.",
      "url": "https://nexwork.dev",
      "image": "https://nexwork.dev/logo.png",
      "softwareVersion": "1.1.0-beta.2",
      "author": {
        "@type": "Organization",
        "name": "Nexwork"
      }
    }
    </script>
    
    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nexwork",
      "url": "https://nexwork.dev",
      "logo": "https://nexwork.dev/logo.png",
      "sameAs": [
        "https://github.com/Ambot9/nexwork-desktop"
      ]
    }
    </script>
    
    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nexwork",
      "url": "https://nexwork.dev",
      "potentialAction": {
        "@type": "ViewAction",
        "target": "https://nexwork.dev/#download"
      }
    }
    </script>

    <div id="app"></div>
